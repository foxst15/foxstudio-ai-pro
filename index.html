<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoxStudio AI Pro - PC Workstation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <script type="importmap">
      {
        "imports": {
          "@google/genai": "https://esm.run/@google/genai",
          "@ffmpeg/ffmpeg": "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js",
          "@ffmpeg/util": "https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js"
        }
      }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#0b0f19] text-gray-100 font-sans min-h-screen p-4 md:p-8 flex justify-center items-start">

    <div class="w-full max-w-6xl bg-[#131b2c] border border-gray-800 rounded-3xl p-5 md:p-8 shadow-[0_0_40px_rgba(0,0,0,0.5)]">
        
        <div class="text-center border-b border-gray-800 pb-4 mb-6">
            <h1 class="text-2xl font-black bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent uppercase tracking-widest">🦊 FOXSTUDIO AI WORKSTATION 🦊</h1>
            <p class="text-xs text-gray-400 mt-1 tracking-wide">Trạm Chỉnh Sửa Phụ Đề & Lồng Tiếng Tự Động (Phiên Bản PC Complete)</p>
        </div>

        <div class="flex flex-col md:flex-row gap-8">
            
            <div class="w-full md:w-1/2 space-y-4">
                
                <div id="uploadZone" class="border-2 border-dashed border-gray-700 hover:border-blue-500 bg-[#0b0f19] rounded-2xl p-8 text-center cursor-pointer transition flex flex-col items-center gap-3 group">
                    <input type="file" id="videoFile" accept="video/*" class="hidden">
                    <svg class="w-10 h-10 text-gray-600 group-hover:text-blue-400 transition transform group-hover:scale-110" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    <p id="uploadLabel" class="text-sm text-gray-400 font-medium">👉 Nhấn hoặc Kéo thả Video vào đây</p>
                </div>
                
                <div id="videoContainer" class="relative w-full aspect-video bg-black rounded-xl overflow-hidden border border-gray-800 hidden">
                    <video id="previewVideo" class="w-full h-full object-contain" controls></video>
                    <div id="blurPreview" class="absolute border border-red-500 bg-red-500/30 hidden pointer-events-none transition-all" style="left: 20%; top: 70%; width: 60%; height: 20%;"></div>
                    <div id="subPreview" class="absolute w-full text-center text-yellow-400 font-black drop-shadow-[0_2px_2px_rgba(0,0,0,1)] hidden pointer-events-none transition-all" style="top: 80%; font-size: 16px;">Văn bản phụ đề mẫu...</div>
                </div>

                <div class="space-y-4 bg-[#0b0f19] p-5 rounded-xl border border-gray-800 hidden" id="editorTools">
                    <h3 class="text-xs font-bold text-amber-500 uppercase tracking-wider border-b border-gray-700 pb-2">🛠️ Căn Chỉnh Khung Hình</h3>
                    
                    <div class="space-y-2">
                        <label class="flex items-center gap-2 text-xs font-bold text-gray-200 cursor-pointer">
                            <input type="checkbox" id="chkBlur" class="rounded accent-red-500"> Kích hoạt Làm Mờ (Che Sub cũ)
                        </label>
                        <div id="blurSettings" class="grid grid-cols-2 gap-3 hidden p-3 bg-[#131b2c] rounded-lg">
                            <div><label class="text-[10px] text-gray-400 block mb-1">Sang trái/phải (%)</label><input type="range" id="bX" min="0" max="100" value="20" class="w-full accent-red-500"></div>
                            <div><label class="text-[10px] text-gray-400 block mb-1">Lên/xuống (%)</label><input type="range" id="bY" min="0" max="100" value="70" class="w-full accent-red-500"></div>
                            <div><label class="text-[10px] text-gray-400 block mb-1">Chiều rộng (%)</label><input type="range" id="bW" min="1" max="100" value="60" class="w-full accent-red-500"></div>
                            <div><label class="text-[10px] text-gray-400 block mb-1">Chiều cao (%)</label><input type="range" id="bH" min="1" max="100" value="20" class="w-full accent-red-500"></div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="flex items-center gap-2 text-xs font-bold text-gray-200 cursor-pointer">
                            <input type="checkbox" id="chkSub" class="rounded accent-yellow-400" checked> Kích hoạt Sub Mới
                        </label>
                        <div id="subSettings" class="grid grid-cols-2 gap-3 p-3 bg-[#131b2c] rounded-lg">
                            <div><label class="text-[10px] text-gray-400 block mb-1">Vị trí Y (%)</label><input type="range" id="sY" min="0" max="100" value="80" class="w-full accent-yellow-400"></div>
                            <div><label class="text-[10px] text-gray-400 block mb-1">Cỡ chữ (%)</label><input type="range" id="sSize" min="1" max="20" value="6" class="w-full accent-yellow-400"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-1/2 flex flex-col gap-4">
                
                <div class="bg-[#0b0f19] rounded-xl p-4 border border-gray-800 space-y-3">
                    <div class="flex justify-between items-center cursor-pointer" id="toggleApiBtn">
                        <h3 class="text-xs font-bold text-blue-400 uppercase tracking-wider">🔑 Cấu Hình Hệ Thống (Bấm mở rộng)</h3>
                        <span class="text-gray-500">▼</span>
                    </div>
                    <div class="space-y-3 hidden mt-2" id="apiConfigPanel">
                        <div><label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">Gemini API Key</label>
                        <input type="password" id="apiKeyInput" class="w-full bg-[#131b2c] border border-gray-700 rounded-lg px-3 py-2 text-xs focus:border-blue-500 focus:outline-none text-blue-300"></div>
                        <div><label class="text-[10px] font-bold text-gray-500 uppercase block mb-1">CapCut Cookie</label>
                        <input type="password" id="cookieInput" class="w-full bg-[#131b2c] border border-gray-700 rounded-lg px-3 py-2 text-xs focus:border-purple-500 focus:outline-none text-purple-300"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
                    <div><label class="text-[10px] text-gray-400 block mb-1">Nguồn Dữ Liệu:</label>
                        <select id="sourceSelect" class="w-full bg-[#1a2333] border border-blue-500 rounded-lg px-2 py-2 text-xs focus:outline-none text-blue-300 font-bold">
                            <option value="ocr">👁️ TỰ ĐỘNG Quét chữ Sub trên Video</option>
                            <option value="audio">🔊 Nghe âm thanh Video (AI Whisper)</option>
                        </select>
                    </div>
                    <div><label class="text-[10px] text-gray-400 block mb-1">Phong Cách Dịch:</label>
                        <select id="styleSelect" class="w-full bg-[#131b2c] border border-gray-700 rounded-lg px-2 py-2 text-xs focus:outline-none text-gray-200">
                            <option value="Phổ thông chính xác (Ưu tiên chuẩn 100% nghĩa gốc)">📝 Phổ Thông (Chính Xác)</option>
                            <option value="Review Phim (Ly kỳ, lôi cuốn)">🎬 Review Phim</option>
                            <option value="Ngôn ngữ giới trẻ (Hài hước, cà khịa)">🔥 Gen Z (Hài hước)</option>
                        </select>
                    </div>
                </div>

                <div id="statusLog" class="text-xs text-center text-gray-400 font-medium bg-[#131b2c] py-2 rounded-lg border border-gray-800">✨ Hãy chọn video để bắt đầu công việc thưa chủ nhân!</div>
                
                <div id="progressContainer" class="hidden bg-[#0b0f19] p-3 rounded-xl border border-blue-900/50 space-y-2">
                    <div class="flex justify-between text-[10px] font-bold text-blue-400">
                        <span id="progressText">Đang xử lý...</span><span id="progressPercent">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 rounded-full h-1.5"><div id="progressBar" class="bg-gradient-to-r from-blue-400 to-purple-500 h-1.5 rounded-full w-0 transition-all duration-300"></div></div>
                </div>

                <button id="btnAutoProcess" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 font-bold py-3.5 text-xs rounded-xl shadow-lg transition-all active:scale-95 text-white uppercase tracking-wider">
                    ▶ Bước 1: Nhận Diện & Dịch Tự Động
                </button>
                
                <textarea id="subTextArea" rows="7" placeholder="Mã SRT kèm mốc thời gian sẽ hiện ở đây..." class="w-full bg-[#0b0f19] border border-gray-800 rounded-xl p-3 text-[11px] font-mono focus:border-green-500 focus:outline-none text-green-400 resize-none"></textarea>

                <div class="border-t border-gray-800 pt-3 flex flex-col gap-3">
                    <div class="flex gap-2 items-end">
                        <div class="flex-1">
                            <label class="text-[10px] text-gray-400 block mb-1">Tùy Chọn Giọng Lồng Tiếng:</label>
                            <select id="voiceSelect" class="w-full bg-[#131b2c] border border-sky-500 rounded-lg px-2 py-2 text-xs focus:outline-none text-sky-300 font-bold">
                                <option value="vi_female_happy">👧 Giọng Nữ (Vui Vẻ)</option>
                                <option value="vi_male">👦 Giọng Nam (Trầm Ấm)</option>
                                <option value="vi_female">👩 Giọng Nữ (Tiêu Chuẩn)</option>
                            </select>
                        </div>
                        <button id="btnVoice" class="flex-1 bg-sky-600 hover:bg-sky-500 font-bold py-2.5 text-xs rounded-xl shadow-md transition-all active:scale-95 text-white disabled:opacity-50">
                            ▶ B2: TẠO LỒNG TIẾNG
                        </button>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button id="btnExSubOnly" class="w-full bg-gradient-to-r from-amber-600 to-orange-600 hover:from-amber-500 hover:to-orange-500 font-bold py-3 text-[10px] rounded-xl shadow-md transition-all active:scale-95 text-white hidden disabled:opacity-50">
                            📥 XUẤT VIDEO (CHỈ CÓ SUB)
                        </button>
                        <button id="btnExDubbed" class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 font-bold py-3 text-[10px] rounded-xl shadow-md transition-all active:scale-95 text-white hidden disabled:opacity-50">
                            🎙️ XUẤT VIDEO (CÓ LỒNG TIẾNG)
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { GoogleGenAI } from '@google/genai';
        import { FFmpeg } from '@ffmpeg/ffmpeg';
        import { fetchFile, toBlobURL } from '@ffmpeg/util';

        const workerCode = `
            import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';
            env.allowLocalModels = false; let transcriber;
            self.onmessage = async (e) => {
                try {
                    if (e.data.action === 'INIT') {
                        transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', { progress_callback: d => self.postMessage({ type: 'PROGRESS', payload: d }) });
                        self.postMessage({ type: 'READY' });
                    } else if (e.data.action === 'TRANSCRIBE') {
                        const res = await transcriber(e.data.payload.audio, { chunk_length_s: 30, return_timestamps: true });
                        self.postMessage({ type: 'RESULT', payload: res.chunks });
                    }
                } catch (err) { self.postMessage({ type: 'ERROR', payload: err.message }); }
            };
        `;
        const aiWorker = new Worker(URL.createObjectURL(new Blob([workerCode], { type: 'application/javascript' })), { type: 'module' });
        const ffmpeg = new FFmpeg();
        let selectedVideoFile = null, finalAudioBlob = null; 

        const D = {
            upZone: document.getElementById('uploadZone'), vFile: document.getElementById('videoFile'), upLabel: document.getElementById('uploadLabel'), 
            pVid: document.getElementById('previewVideo'), vCont: document.getElementById('videoContainer'), editTools: document.getElementById('editorTools'),
            apiInp: document.getElementById('apiKeyInput'), ckInp: document.getElementById('cookieInput'), btnTogApi: document.getElementById('toggleApiBtn'), apiPan: document.getElementById('apiConfigPanel'),
            sourceSel: document.getElementById('sourceSelect'), voiceSel: document.getElementById('voiceSelect'),
            chkBlur: document.getElementById('chkBlur'), bSet: document.getElementById('blurSettings'), bP: document.getElementById('blurPreview'), bX: document.getElementById('bX'), bY: document.getElementById('bY'), bW: document.getElementById('bW'), bH: document.getElementById('bH'),
            chkSub: document.getElementById('chkSub'), sSet: document.getElementById('subSettings'), sP: document.getElementById('subPreview'), sY: document.getElementById('sY'), sSize: document.getElementById('sSize'), styleSel: document.getElementById('styleSelect'),
            btnAP: document.getElementById('btnAutoProcess'), btnV: document.getElementById('btnVoice'), 
            btnExSub: document.getElementById('btnExSubOnly'), btnExDub: document.getElementById('btnExDubbed'),
            subTxt: document.getElementById('subTextArea'), log: document.getElementById('statusLog'),
            pCont: document.getElementById('progressContainer'), pBar: document.getElementById('progressBar'), pTxt: document.getElementById('progressText'), pPerc: document.getElementById('progressPercent')
        };

        const uLog = (msg, type='info') => {
            const colors = { info: 'text-gray-400', success: 'text-green-400', error: 'text-red-400', warn: 'text-yellow-400' };
            D.log.className = `text-xs text-center font-bold ${colors[type]} py-2`; D.log.innerText = msg;
        };
        const setProg = (t, p) => { D.pTxt.innerText = t; D.pBar.style.width = `${p}%`; D.pPerc.innerText = `${p}%`; };

        const fmtTime = (sec) => {
            if(!sec) sec=0; const h=Math.floor(sec/3600).toString().padStart(2,'0'), m=Math.floor((sec%3600)/60).toString().padStart(2,'0'), s=Math.floor(sec%60).toString().padStart(2,'0'), ms=Math.floor((sec%1)*1000).toString().padStart(3,'0');
            return `${h}:${m}:${s},${ms}`;
        };
        const parseTime = (str) => { const p=str.split(/[:,]/); return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(p[2]) + parseInt(p[3])/1000; };

        window.onload = () => { D.apiInp.value = localStorage.getItem('fox_api')||''; D.ckInp.value = localStorage.getItem('fox_ck')||''; };
        D.apiInp.oninput = e => localStorage.setItem('fox_api', e.target.value); D.ckInp.oninput = e => localStorage.setItem('fox_ck', e.target.value);
        D.btnTogApi.onclick = () => { D.apiPan.classList.toggle('hidden'); D.btnTogApi.querySelector('span').innerText = D.apiPan.classList.contains('hidden') ? '▼' : '▲'; };

        D.chkBlur.onchange = e => { D.bSet.classList.toggle('hidden', !e.target.checked); D.bP.classList.toggle('hidden', !e.target.checked); };
        D.chkSub.onchange = e => { D.sSet.classList.toggle('hidden', !e.target.checked); D.sP.classList.toggle('hidden', !e.target.checked); };
        
        const updPrev = () => { D.bP.style.left=D.bX.value+'%'; D.bP.style.top=D.bY.value+'%'; D.bP.style.width=D.bW.value+'%'; D.bP.style.height=D.bH.value+'%'; D.sP.style.top=D.sY.value+'%'; D.sP.style.fontSize=(D.sSize.value*3)+'px'; };
        [D.bX, D.bY, D.bW, D.bH, D.sY, D.sSize].forEach(el => el.oninput = updPrev);

        D.upZone.onclick = () => D.vFile.click();
        D.vFile.onchange = e => {
            if (e.target.files[0]) {
                selectedVideoFile = e.target.files[0]; D.pVid.src = URL.createObjectURL(selectedVideoFile);
                D.vCont.classList.remove('hidden'); D.editTools.classList.remove('hidden');
                D.upLabel.innerText = selectedVideoFile.name; uLog(`Đã nạp video: ${selectedVideoFile.name}`, 'success');
            }
        };

        D.btnAP.onclick = async () => {
            if (!D.apiInp.value || !selectedVideoFile) return uLog('⚠️ Điền API Key và chọn Video!', 'warn');
            D.btnAP.disabled = true; D.pCont.classList.remove('hidden');
            try {
                let chunks = [];
                if (D.sourceSel.value === 'ocr') {
                    uLog('AI quét ảnh OCR...', 'info'); setProg('Nạp lõi quét ảnh...', 0);
                    const offV = document.createElement('video'); offV.src = URL.createObjectURL(selectedVideoFile);
                    await new Promise(r => offV.onloadedmetadata = r);
                    const cvs = document.createElement('canvas'); cvs.width=offV.videoWidth; cvs.height=offV.videoHeight*0.3;
                    const ctx = cvs.getContext('2d'), wkr = await Tesseract.createWorker('chi_sim+eng');
                    let lastT = "", curStart = 0;
                    for (let t=0; t<offV.duration; t+=2) {
                        offV.currentTime = t; await new Promise(r => offV.onseeked = r);
                        ctx.drawImage(offV, 0, offV.videoHeight*0.7, offV.videoWidth, offV.videoHeight*0.3, 0, 0, cvs.width, cvs.height);
                        const txt = (await wkr.recognize(cvs)).data.text.replace(/\s+/g,' ').trim();
                        if (txt.length>1 && txt!==lastT) { if(lastT!=="") chunks.push({start:curStart, end:t, text:lastT}); lastT=txt; curStart=t; }
                        setProg('Quét Video...', Math.round((t/offV.duration)*100));
                    }
                    if(lastT!=="") chunks.push({start:curStart, end:offV.duration, text:lastT});
                    await wkr.terminate();
                } else {
                    uLog('Tách âm thanh Whisper...', 'info');
                    const aCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate:16000});
                    const buf = await aCtx.decodeAudioData(await selectedVideoFile.arrayBuffer());
                    chunks = await new Promise((res, reject) => {
                        aiWorker.onmessage = e => {
                            if(e.data.type==='PROGRESS') setProg(`Nạp AI: ${e.data.payload.file}`, Math.round(e.data.payload.progress||0));
                            else if(e.data.type==='READY') { setProg('Đang nghe...', 100); aiWorker.postMessage({action:'TRANSCRIBE', payload:{audio:buf.getChannelData(0)}}); }
                            else if(e.data.type==='RESULT') res(e.data.payload); else reject(new Error(e.data.payload));
                        }; aiWorker.postMessage({action:'INIT'});
                    });
                }
                let srt = ""; chunks.forEach((c,i) => { const s=c.timestamp?c.timestamp[0]:c.start, e=c.timestamp?c.timestamp[1]:c.end; srt+=`${i+1}\n${fmtTime(s)} --> ${fmtTime(e)}\n${c.text.trim()}\n\n`; });
                uLog('Gemini dịch SRT...', 'info'); D.pCont.classList.add('hidden');
                const ai = new GoogleGenAI({ apiKey: D.apiInp.value });
                const resp = await ai.models.generateContent({ model:'gemini-2.5-flash', contents:srt, config:{systemInstruction:`Dịch SRT sang Tiếng Việt. Style: ${D.styleSel.value}. GIỮ NGUYÊN cấu trúc thời gian/số thứ tự.`} });
                D.subTxt.value = resp.text; uLog('✅ Xong Bước 1! Bạn có thể Xuất Video Chỉ Sub hoặc Lồng Tiếng.', 'success');
                D.btnExSub.classList.remove('hidden');
            } catch (err) { uLog(`❌ Lỗi: ${err.message}`, 'error'); D.pCont.classList.add('hidden'); }
            finally { D.btnAP.disabled = false; }
        };

        D.btnV.onclick = async () => {
            if (!D.subTxt.value || !D.ckInp.value) return uLog('⚠️ Cần SRT và Cookie!', 'warn');
            const cTxt = D.subTxt.value.replace(/^\d+$/gm,'').replace(/^\d{2}:\d{2}:\d{2},\d{3} --> \d{2}:\d{2}:\d{2},\d{3}$/gm,'').replace(/\n+/g,' ').trim();
            if(!cTxt) return;
            D.btnV.disabled = true; uLog(`⏳ Tạo âm thanh [${D.voiceSel.options[D.voiceSel.selectedIndex].text}]...`, 'info');
            try {
                const proxy = 'https://corsproxy.io/?' + encodeURIComponent('https://www.capcut.com/api/v1/tts/stream');
                const res = await fetch(proxy, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Cookie': D.ckInp.value }, body: JSON.stringify({ "speaker_id": D.voiceSel.value, "text": cTxt, "platform": "web" }) });
                if (!res.ok) throw new Error('Proxy/Cookie lỗi!');
                finalAudioBlob = await res.blob(); new Audio(URL.createObjectURL(finalAudioBlob)).play();
                D.btnExDub.classList.remove('hidden'); uLog('🔊 Lồng tiếng xong!', 'success');
            } catch (err) { uLog(`❌ Lỗi TTS: ${err.message}`, 'error'); }
            finally { D.btnV.disabled = false; }
        };

        const renderVideo = async (useVoice) => {
            if (!selectedVideoFile) return;
            D.pCont.classList.remove('hidden');
            try {
                if (!ffmpeg.loaded) { 
                    const baseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
                    await ffmpeg.load({ coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'), wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'), workerURL: await toBlobURL('https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/worker.js', 'text/javascript') }); 
                }
                ffmpeg.on('progress', ({ progress }) => setProg('Đang Render...', Math.round(progress * 100)));
                await ffmpeg.writeFile('in.mp4', await fetchFile(selectedVideoFile));
                
                let filterChain = [];
                if (D.chkSub.checked) {
                    await ffmpeg.writeFile('subs.srt', D.subTxt.value);
                    await ffmpeg.writeFile('font.ttf', new Uint8Array(await (await fetch('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.66/fonts/Roboto/Roboto-Regular.ttf')).arrayBuffer()));
                    filterChain.push(`subtitles=subs.srt:fontsdir=.:force_style='FontSize=${D.sSize.value*3},Alignment=6'`);
                }
                if (D.chkBlur.checked) {
                    const vw = D.pVid.videoWidth, vh = D.pVid.videoHeight;
                    filterChain.push(`delogo=x=${D.bX.value*vw/100}:y=${D.bY.value*vh/100}:w=${D.bW.value*vw/100}:h=${D.bH.value*vh/100}`);
                }
                
                let cmd = ['-i', 'in.mp4'];
                if (useVoice && finalAudioBlob) {
                    await ffmpeg.writeFile('au.mp3', await fetchFile(finalAudioBlob));
                    cmd.push('-i', 'au.mp3', '-filter_complex', `${filterChain.join(',')}`, '-c:v', 'libx264', '-preset', 'faster', '-map', '0:v:0', '-map', '1:a:0', '-shortest', 'out.mp4');
                } else {
                    cmd.push('-vf', filterChain.join(','), '-c:v', 'libx264', '-preset', 'faster', '-c:a', 'copy', 'out.mp4');
                }
                
                await ffmpeg.exec(cmd);
                const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([await ffmpeg.readFile('out.mp4')], {type: 'video/mp4'})); a.download = `FoxStudio_${Date.now()}.mp4`; a.click();
                uLog('🎉 Hoàn thành!', 'success');
                await ffmpeg.deleteFile('in.mp4'); if(useVoice) await ffmpeg.deleteFile('au.mp3');
            } catch (err) { uLog(`❌ Lỗi: ${err.message}`, 'error'); }
            finally { D.pCont.classList.add('hidden'); }
        };

        D.btnExSub.onclick = () => renderVideo(false);
        D.btnExDub.onclick = () => renderVideo(true);
    </script>
</body>
</html>
